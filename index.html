<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Wimpout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== SETUP SCREEN ===== -->
  <div id="setup-screen" class="screen active">
    <div class="setup-container">
      <div class="logo">
        <div class="logo-stars">✦ ✧ ✦</div>
        <h1 class="logo-title">COSMIC<br>WIMPOUT</h1>
        <p class="logo-sub">Pass &amp; Play Dice Game</p>
      </div>

      <div class="setup-card">
        <h2 class="section-label">PLAYERS</h2>
        <div id="player-fields">
          <div class="player-field">
            <span class="player-num">1</span>
            <input type="text" class="player-name-input" placeholder="Player 1" maxlength="14" autocomplete="off">
          </div>
          <div class="player-field">
            <span class="player-num">2</span>
            <input type="text" class="player-name-input" placeholder="Player 2" maxlength="14" autocomplete="off">
          </div>
        </div>
        <button id="add-player-btn" class="btn btn-ghost">+ Add Player</button>

        <h2 class="section-label" style="margin-top:10px">RULES</h2>
        <div class="option-list">
          <label class="option-row">
            <span class="option-label">
              <span class="option-title">Entry Requirement</span>
              <span class="option-desc">Must score 35+ pts to get on the board</span>
            </span>
            <input type="checkbox" id="opt-entry" class="toggle" checked>
          </label>
          <label class="option-row">
            <span class="option-label">
              <span class="option-title">Clear Flashes</span>
              <span class="option-desc">Must roll remaining dice after a flash</span>
            </span>
            <input type="checkbox" id="opt-clear-flash" class="toggle" checked>
          </label>
          <label class="option-row">
            <span class="option-label">
              <span class="option-title">All Five Scored</span>
              <span class="option-desc">Must roll all 5 again when all dice score</span>
            </span>
            <input type="checkbox" id="opt-all-five" class="toggle" checked>
          </label>
        </div>

        <button id="start-game-btn" class="btn btn-primary btn-wide">LAUNCH GAME</button>
      </div>
    </div>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="game-screen" class="screen" hidden>

    <!-- Score Board -->
    <div id="score-board">
      <div id="score-list"></div>
    </div>

    <!-- Current Player Banner -->
    <div id="player-banner">
      <div id="banner-name">Player 1</div>
      <div id="banner-turn-score">Turn: <span id="turn-score-val">0</span></div>
    </div>

    <!-- Dice -->
    <div id="dice-area">
      <div id="dice-row">
        <div class="die" id="die-0"><span class="die-face"></span></div>
        <div class="die" id="die-1"><span class="die-face"></span></div>
        <div class="die" id="die-2"><span class="die-face"></span></div>
        <div class="die" id="die-3"><span class="die-face"></span></div>
        <div class="die black-die" id="die-4"><span class="die-face"></span></div>
      </div>
      <p id="dice-hint"></p>
    </div>

    <!-- Message -->
    <div id="message-box">
      <div id="msg-main"></div>
      <div id="msg-sub"></div>
    </div>

    <!-- Buttons -->
    <div id="btn-row">
      <button id="roll-btn" class="btn btn-primary btn-action" disabled>ROLL</button>
      <button id="bank-btn" class="btn btn-bank btn-action" disabled>BANK</button>
    </div>
    <div id="btn-row2">
      <button id="next-btn" class="btn btn-accent btn-wide" hidden>NEXT PLAYER →</button>
    </div>

  </div>

  <!-- ===== GAME OVER SCREEN ===== -->
  <div id="gameover-screen" class="screen" hidden>
    <div class="gameover-container">
      <div class="winner-trophy">🏆</div>
      <div class="winner-label">WINNER</div>
      <h1 id="winner-name-display"></h1>
      <p id="winner-score-display"></p>
      <div id="final-score-list"></div>
      <button id="play-again-btn" class="btn btn-primary btn-wide">PLAY AGAIN</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
